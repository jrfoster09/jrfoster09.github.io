<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PAGE TITLE — set per-page using: title: Your Title in the front matter -->
  <title>{{ page.title }} · Jack Foster</title>

  <!-- ============================================================
       OPEN GRAPH — controls how this page looks when shared on
       LinkedIn, iMessage, Twitter/X, WhatsApp etc.
       The page.description is set in each page's front matter.
       If not set, falls back to the default description below.
  ============================================================ -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="Jack Foster" />
  <meta property="og:title"       content="{{ page.title }} · Jack Foster" />
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}Sixth form engineering student working towards a career in Formula 1. Portfolio of projects, experience and achievements.{% endif %}" />
  <meta property="og:url"         content="https://jrfoster09.github.io{{ page.url }}" />
  <meta property="og:image"       content="https://jrfoster09.github.io/og-image.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale"      content="en_GB" />

  <!-- Twitter/X card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="{{ page.title }} · Jack Foster" />
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}Sixth form engineering student working towards a career in Formula 1. Portfolio of projects, experience and achievements.{% endif %}" />
  <meta name="twitter:image"       content="https://jrfoster09.github.io/og-image.png" />

  <!-- General meta -->
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}Sixth form engineering student working towards a career in Formula 1. Portfolio of projects, experience and achievements.{% endif %}" />
  <meta name="author" content="Jack Foster" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Barlow:wght@200;300;400;500&family=Barlow+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>

    /* ============================================================
       COLOUR VARIABLES — change here to retheme every page at once
    ============================================================ */
    :root {
      --gold:        #c9a84c;
      --gold-light:  #e2c47a;
      --gold-dim:    rgba(201,168,76,0.12);
      --white:       #f5f5f0;
      --white-soft:  rgba(245,245,240,0.7);
      --white-muted: rgba(245,245,240,0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ============================================================
       BACKGROUND — carbon fibre weave
    ============================================================ */
    body {
      min-height: 100vh;
      font-family: 'Barlow', sans-serif;
      font-weight: 300;
      color: var(--white);
      background-color: #141414;
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent, transparent 3px,
          rgba(255,255,255,0.018) 3px,
          rgba(255,255,255,0.018) 4px
        ),
        repeating-linear-gradient(
          0deg,
          transparent, transparent 3px,
          rgba(255,255,255,0.018) 3px,
          rgba(255,255,255,0.018) 4px
        ),
        repeating-linear-gradient(
          45deg,
          rgba(0,0,0,0.35) 0px,   rgba(0,0,0,0.35) 2px,
          rgba(30,30,30,0.6) 2px, rgba(30,30,30,0.6) 4px
        ),
        repeating-linear-gradient(
          135deg,
          rgba(0,0,0,0.35) 0px,   rgba(0,0,0,0.35) 2px,
          rgba(20,20,20,0.6) 2px, rgba(20,20,20,0.6) 4px
        );
      background-size: 4px 4px, 4px 4px, 8px 8px, 8px 8px;
      overflow-x: hidden;
    }

    /* dark vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, transparent 40%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 0;
    }

    body > * { position: relative; z-index: 1; }

    /* ============================================================
       TOP GOLD RULE
    ============================================================ */
    .top-rule {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold-light) 50%, var(--gold) 70%, transparent);
    }

    /* ============================================================
       BACK NAV — top-left arrow back to homepage
    ============================================================ */
    .back-nav {
      padding: 20px 40px;
      display: flex;
      align-items: center;
    }

    .back-link {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--white-muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--gold); }

    .back-link::before {
      content: '←';
      font-size: 14px;
    }

    /* ============================================================
       PAGE HEADER — title and subtitle for each sub-page
    ============================================================ */
    .page-header {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 32px 50px;
      animation: fadeUp 0.8s 0.1s ease both;
    }

    .page-header-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .page-header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 8vw, 72px);
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1;
      color: var(--white);
    }

    .page-header-rule {
      width: 36px;
      height: 1px;
      background: var(--gold);
      margin-top: 24px;
    }

    /* ============================================================
       MAIN CONTENT AREA — page-specific HTML drops in here
    ============================================================ */
    .page-content {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 32px 100px;
      animation: fadeUp 0.8s 0.25s ease both;
    }

    /* ============================================================
       FOOTER
    ============================================================ */
    footer {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 26px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer p {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white-muted);
    }
    .footer-line {
      width: 28px; height: 1px;
      background: var(--gold);
      opacity: 0.35;
    }

    /* ============================================================
       ANIMATIONS
    ============================================================ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(26px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 600px) {
      .back-nav { padding: 16px 20px; }
      .page-header { padding: 30px 20px 40px; }
      .page-content { padding: 0 20px 80px; }
      footer { flex-direction: column; gap: 10px; }
    }

    /* ============================================================
       ADDITIONAL STYLES — used by sub-pages (cards, grids, etc.)
       These are shared utilities available to all pages
    ============================================================ */

    /* link card — used on links.html */
    .link-card {
      display: flex;
      align-items: center;
      gap: 20px;
      text-decoration: none;
      border: 1px solid rgba(201,168,76,0.28);
      padding: 24px 28px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
      margin-bottom: 12px;
      color: var(--white);
    }
    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold-dim);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .link-card:hover { border-color: rgba(201,168,76,0.85); }
    .link-card:hover::before { opacity: 1; }

    .link-card-icon {
      position: relative;
      z-index: 1;
      width: 44px; height: 44px;
      border: 1px solid rgba(201,168,76,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--gold);
      flex-shrink: 0;
    }

    .link-card-text { position: relative; z-index: 1; }

    .link-card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--white);
    }

    .link-card-handle {
      font-family: 'Barlow', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: var(--white-muted);
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    .link-card-arrow {
      margin-left: auto;
      font-size: 20px;
      color: var(--gold);
      opacity: 0.4;
      transition: opacity 0.3s, transform 0.3s;
      position: relative;
      z-index: 1;
    }
    .link-card:hover .link-card-arrow { opacity: 1; transform: translateX(5px); }

  </style>
</head>
<body>

  <!-- TOP GOLD LINE -->
  <div class="top-rule"></div>

  <!-- BACK TO HOME -->
  <nav class="back-nav">
    <a href="/" class="back-link">Home</a>
  </nav>

  <!-- PAGE HEADER — populated from front matter -->
  <header class="page-header">
    <div class="page-header-label">{{ page.label }}</div>
    <h1 class="page-header-title">{{ page.title }}</h1>
    <div class="page-header-rule"></div>
  </header>

  <!-- PAGE CONTENT — each sub-page's HTML goes here -->
  <main class="page-content">
    {{ content }}
  </main>

  <!-- FOOTER -->
  <footer>
    <p>Jack Foster</p>
    <div class="footer-line"></div>
    <p>Built from scratch</p>
  </footer>

  <!-- scroll reveal -->
  <script>
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
    reveals.forEach(el => observer.observe(el));
  </script>

</body>
</html>
